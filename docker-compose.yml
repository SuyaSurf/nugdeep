version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bammby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bammby}
      POSTGRES_DB: ${POSTGRES_DB:-bammby}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bammby} -d ${POSTGRES_DB:-bammby}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: ./server
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bammby}:${POSTGRES_PASSWORD:-bammby}@db:5432/${POSTGRES_DB:-bammby}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    profiles: ["migrate"]

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-bammby}:${POSTGRES_PASSWORD:-bammby}@db:5432/${POSTGRES_DB:-bammby}?sslmode=disable
      REDIS_URL: redis:6379
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ${LIVEKIT_URL}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
