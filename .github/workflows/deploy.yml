name: Deploy

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build steps (use existing artifacts)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.skip_build != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        if: inputs.skip_build != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Go backend (Linux amd64)
        if: inputs.skip_build != 'true'
        working-directory: ./server
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -o ../nugdeep-api ./cmd/api

      - name: Build Next.js frontend
        if: inputs.skip_build != 'true'
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
            --exclude='web/.next/cache' \
            nugdeep-api \
            web/.next \
            web/public \
            web/package.json \
            web/package-lock.json \
            web/scripts

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Write env files
        run: |
          printf '%s\n' "$BACKEND_ENV" > backend.env
          printf '%s\n' "$FRONTEND_ENV" > frontend.env
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}

      - name: Upload package, env files, and deploy script
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 \
            deploy.tar.gz backend.env frontend.env scripts/remote-deploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}:~/nugdeep/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} \
            'bash ~/nugdeep/remote-deploy.sh'

      - name: Verify deployment
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w "%{http_code}" https://nugdeep.suya.surf/ || echo "000")
          echo "nugdeep.suya.surf returned HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Frontend returned non-200 status"
          fi
