name: Deploy

on:
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build steps (use existing artifacts)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        if: inputs.skip_build != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        if: inputs.skip_build != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build Go backend (Linux amd64)
        if: inputs.skip_build != 'true'
        working-directory: ./server
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -o ../nugdeep-api ./cmd/api

      - name: Build Next.js frontend
        if: inputs.skip_build != 'true'
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
            --exclude='web/.next/cache' \
            nugdeep-api \
            web/.next \
            web/public \
            web/package.json \
            web/package-lock.json \
            web/scripts

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write env files
        run: |
          printf '%s\n' "$BACKEND_ENV" > backend.env
          printf '%s\n' "$FRONTEND_ENV" > frontend.env
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
          FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}

      - name: Upload package and env files
        run: |
          scp -i ~/.ssh/deploy_key -P ${{ secrets.SSH_PORT }} \
            deploy.tar.gz backend.env frontend.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }}:~/nugdeep/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SERVER_HOST }} << 'DEPLOY_SCRIPT'
          set -euo pipefail
          cd ~/nugdeep

          echo "=== Extracting package ==="
          rm -rf deploy_extract
          mkdir deploy_extract
          cd deploy_extract
          tar xzf ../deploy.tar.gz
          echo "Extracted"

          echo "=== Installing backend binary ==="
          cd ~/nugdeep
          mv nugdeep-api nugdeep-api.old 2>/dev/null || true
          mv deploy_extract/nugdeep-api .
          chmod +x nugdeep-api

          echo "=== Moving env files ==="
          mv backend.env .deploy_backend_env
          mv frontend.env .env.live

          echo "=== Restarting backend Docker container ==="
          sudo docker rm -f nugdeep-api 2>/dev/null || true
          sudo docker run -d \
            --name nugdeep-api \
            --network tovbase_default \
            -p 127.0.0.1:9021:8080 \
            --restart unless-stopped \
            -v /home/venservant/nugdeep:/nugdeep \
            --env-file ~/nugdeep/.deploy_backend_env \
            alpine:latest /nugdeep/nugdeep-api
          sleep 3
          echo "Backend started"

          echo "=== Installing frontend ==="
          cd ~/nugdeep
          rm -rf web_old
          mv web web_old 2>/dev/null || true
          mkdir -p web
          mv deploy_extract/web/.next web/
          mv deploy_extract/web/public web/
          mv deploy_extract/web/scripts web/
          cp deploy_extract/web/package.json web/
          cp deploy_extract/web/package-lock.json web/
          cp ~/nugdeep/.env.live web/.env

          echo "=== Installing node_modules ==="
          cd ~/nugdeep/web
          npm ci --omit=dev 2>/dev/null || npm install

          echo "=== Restarting frontend ==="
          fuser -k 9012/tcp 2>/dev/null || true
          sleep 2
          PORT=9012 nohup npm start > ~/nugdeep/web/frontend.log 2>&1 &
          sleep 5
          echo "Frontend started"

          echo "=== Verifying ==="
          curl -s -o /dev/null -w "Frontend HTTP: %{http_code}\n" http://127.0.0.1:9012/
          sudo docker ps --filter name=nugdeep-api --format "Backend: {{.Status}}"

          echo "=== Cleaning up ==="
          cd ~/nugdeep
          rm -rf deploy_extract deploy.tar.gz nugdeep-api.old
          echo "=== Deployment complete ==="
          DEPLOY_SCRIPT

      - name: Verify deployment
        run: |
          sleep 5
          code=$(curl -s -o /dev/null -w "%{http_code}" https://nugdeep.suya.surf/ || echo "000")
          echo "nugdeep.suya.surf returned HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::Frontend returned non-200 status"
          fi
